<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jardineiro.AI - Seu Mentor de Plantas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Poppins', sans-serif; overflow: hidden; background-color: #111; color: white; }
        
        /* Otimização para Câmera no Android */
        video { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; 
            opacity: 0; transition: opacity 0.5s ease-in-out; /* Fade-in suave */
        }
        /* Remove botão de play nativo */
        video::-webkit-media-controls { display: none !important; }
        video::-webkit-media-controls-start-playback-button { display: none !important; -webkit-appearance: none; }

        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 0; display: none; }
        
        #ui-container { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 2; background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0)); }
        #output-panel { background: rgba(10, 20, 10, 0.95); backdrop-filter: blur(5px); max-height: 85vh; overflow-y: auto; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        
        .result-card { padding: 25px; }
        .diagnosis-section { background-color: rgba(220, 38, 38, 0.1); border: 1px solid #ef4444; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .plan-step { border-left: 3px solid #22c55e; padding-left: 15px; margin-bottom: 15px; }
        .disclaimer { font-size: 0.75rem; text-align: center; opacity: 0.6; padding: 20px 10px; }
        
        /* Botões de rádio estilizados */
        .analysis-options { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .analysis-options input { display: none; }
        .analysis-options label {
            padding: 10px 20px; border: 1px solid #4ade80; color: #4ade80; border-radius: 50px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
        }
        .analysis-options input:checked + label { background-color: #4ade80; color: #064e3b; font-weight: 700; box-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="absolute top-4 right-4 z-50">
        <a href="jardim://assinar" id="btn-premium" class="bg-yellow-500 hover:bg-yellow-400 text-yellow-900 text-xs font-bold px-4 py-2 rounded-full shadow-lg transition-colors duration-300">
            Assinar Premium
        </a>
        <div id="premium-success" class="hidden bg-green-500 text-white text-xs font-bold px-4 py-2 rounded-full shadow-lg">
            Premium ✓
        </div>
    </div>

    <div id="ui-container">
        <div id="output-panel" style="display:none;"></div>
        
        <div id="controls" class="p-6 text-center">
            <div class="analysis-options">
                <input type="radio" id="identificacao" name="analysis_type" value="identificacao" checked>
                <label id="lbl-identificacao" for="identificacao">🌿 Identificar</label>
                
                <input type="radio" id="diagnostico" name="analysis_type" value="diagnostico">
                <label id="lbl-diagnostico" for="diagnostico">🩺 Diagnosticar Doença</label>
            </div>
            
            <button id="captureBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-6 rounded-full shadow-lg transition-transform transform active:scale-95 text-lg">
                📸 Analisar Planta
            </button>
        </div>
    </div>

    <script>
        // --- DICIONÁRIO DE IDIOMAS (8 Idiomas + PT) ---
        const i18n = {
            "pt": {
                identify: "🌿 Identificar",
                diagnose: "🩺 Diagnosticar Doença",

                retryBtn: "Tentar novamente",

                problemLabel: "Problema:",

                analyzeAnotherBtn: "Analisar Outra Planta",

                premiumSuccess: "Premium Confirmado!",

            },
            "en": {
                identify: "🌿 Identify",
                diagnose: "🩺 Diagnose Disease",
                captureBtn: "Analyze Plant",
                loading: "Consulting the expert...",
                errorMsg: "Couldn't analyze. Try getting closer.",
                retryBtn: "Try again",
                diagnosisTitle: "⚠️ Diagnosis",
                problemLabel: "Problem:",
                causeLabel: "Cause:",
                healthStatusLabel: "Health Status",
                carePlanTitle: "📝 Care Plan",
                analyzeAnotherBtn: "Analyze Another Plant",
                premiumBtnBase: "Subscribe Premium",
                premiumSuccess: "Premium Confirmed!",

                backBtn: "Back to Camera"
            },
            "es": {

                diagnose: "🩺 Diagnosticar Enf.",
                captureBtn: "Analizar Planta",
                loading: "Consultando al experto...",
                errorMsg: "No pude analizar. Acércate más.",
                retryBtn: "Intentar de nuevo",
                diagnosisTitle: "⚠️ Diagnóstico",
                problemLabel: "Problema:",
                causeLabel: "Causa:",
                healthStatusLabel: "Estado de Salud",
                carePlanTitle: "📝 Plan de Cuidados",
                analyzeAnotherBtn: "Analizar Otra Planta",
                premiumBtnBase: "Suscribirse Premium",
                premiumSuccess: "¡Premium Confirmado!",
                needsPremium: "Para analizar sus plantas y recibir diagnósticos, por favor suscríbase a Premium tocando el botón en la parte superior.",
                backBtn: "Volver a la Cámara"
            },
            "de": {
                identify: "🌿 Identifizieren",
                diagnose: "🩺 Krankheit Diagnostizieren",
                captureBtn: "Pflanze Analysieren",
                loading: "Experten konsultieren...",
                errorMsg: "Analyse fehlgeschlagen. Gehen Sie näher heran.",
                retryBtn: "Erneut versuchen",
                diagnosisTitle: "⚠️ Diagnose",
                problemLabel: "Problem:",

                healthStatusLabel: "Gesundheitszustand",

                backBtn: "Zurück zur Kamera"
            },
            "fr": {
                identify: "🌿 Identifier",
                diagnose: "🩺 Diagnostiquer",
                captureBtn: "Analyser la Plante",
                loading: "Consultation de l'expert...",
                errorMsg: "Impossible d'analyser. Rapprochez-vous.",

                diagnosisTitle: "⚠️ Diagnostic",
                problemLabel: "Problème:",

                healthStatusLabel: "État de Santé",
                carePlanTitle: "📝 Plan de Soins",
                analyzeAnotherBtn: "Analyser une Autre",
                premiumBtnBase: "S'abonner Premium",
                premiumSuccess: "Premium Confirmé!",
                needsPremium: "Pour analyser vos plantes et recevoir des diagnostics, veuillez vous abonner à Premium en appuyant sur le bouton en haut.",
                backBtn: "Retour à la Caméra"
            },
            "it": {
                identify: "🌿 Identifica",
                diagnose: "🩺 Diagnostica Malattia",
                captureBtn: "Analizza Pianta",
                loading: "Consultando l'esperto...",
                errorMsg: "Impossibile analizzare. Avvicinati.",
                retryBtn: "Riprova",
                diagnosisTitle: "⚠️ Diagnosi",

                carePlanTitle: "📝 Piano di Cura",
                analyzeAnotherBtn: "Analizza un'Altra",
                premiumBtnBase: "Abbonamento Premium",
                premiumSuccess: "Premium Confermato!",
                needsPremium: "Per analizzare le tue piante e ricevere diagnosi, abbonati a Premium toccando il pulsante in alto.",
                backBtn: "Torna alla Fotocamera"
            },
            "zh": {
                identify: "🌿 识别",
                diagnose: "🩺 诊断疾病",
                captureBtn: "分析植物",
                loading: "咨询专家中...",
                errorMsg: "无法分析。请靠近一点。",
                retryBtn: "重试",
                diagnosisTitle: "⚠️ 诊断",
                problemLabel: "问题:",
                causeLabel: "原因:",
                healthStatusLabel: "健康状况",
                carePlanTitle: "📝 护理计划",
                analyzeAnotherBtn: "分析另一株植物",
                premiumBtnBase: "订阅高级版",
                premiumSuccess: "高级版已确认！",
                needsPremium: "要分析您的植物并获取诊断，请点击顶部的按钮订阅高级版。",
                backBtn: "返回相机"
            },
            "ko": {
                identify: "🌿 식별하기",
                diagnose: "🩺 질병 진단",
                captureBtn: "식물 분석",
                loading: "전문가와 상담 중...",
                errorMsg: "분석할 수 없습니다. 더 가까이 가보세요.",
                retryBtn: "다시 시도",
                diagnosisTitle: "⚠️ 진단",
                problemLabel: "문제:",
                causeLabel: "원인:",
                healthStatusLabel: "건강 상태",
                carePlanTitle: "📝 관리 계획",
                analyzeAnotherBtn: "다른 식물 분석",
                premiumBtnBase: "프리미엄 구독",
                premiumSuccess: "프리미엄 확인됨!",
                needsPremium: "식물을 분석하고 진단을 받으려면 상단의 버튼을 탭하여 프리미엄을 구독하세요.",
                backBtn: "카메라로 돌아가기"
            },
            "ja": {
                identify: "🌿 識別する",
                diagnose: "🩺 病気の診断",
                captureBtn: "植物を分析",
                loading: "専門家に相談中...",
                errorMsg: "分析できませんでした。もっと近づいてください。",
                retryBtn: "再試行",
                diagnosisTitle: "⚠️ 診断",
                problemLabel: "問題:",
                causeLabel: "原因:",
                healthStatusLabel: "健康状態",
                carePlanTitle: "📝 ケアプラン",
                analyzeAnotherBtn: "別の植物を分析",
                premiumBtnBase: "プレミアム購読",
                premiumSuccess: "プレミアム確認済み！",
                needsPremium: "植物を分析して診断を受け取るには、上部のボタンをタップしてプレミアムを購読してください。",
                backBtn: "カメラに戻る"
            }
        };

        // Extrai idioma da URL (Android) ou fallback
        const urlParams = new URLSearchParams(window.location.search);
        let userLang = urlParams.get('lang') || navigator.language.slice(0, 2);
        
        // Se idioma não existir no dicionário, cai pro inglês
        if (!i18n[userLang]) {
            userLang = 'en'; 
        }
        const t = i18n[userLang];

        // --- TRADUÇÃO INICIAL DA TELA ---
        document.documentElement.lang = userLang;
        document.getElementById('lbl-identificacao').innerText = t.identify;
        document.getElementById('lbl-diagnostico').innerText = t.diagnose;
        document.getElementById('captureBtn').innerText = `📸 ${t.captureBtn}`;
        document.getElementById('btn-premium').innerText = t.premiumBtnBase;

        // --- VARIÁVEL DE CONTROLE PREMIUM ---
        let isUserPremium = false;

        // --- LÓGICA DE ASSINATURA (COMUNICAÇÃO COM JAVA) ---
        const btnPremium = document.getElementById('btn-premium');
        const premiumSuccess = document.getElementById('premium-success');

        window.updatePremiumPrice = function(priceString) {
            if (btnPremium) {
                btnPremium.innerText = t.premiumBtnBase + " " + priceString;
            }
        };

        window.setPremiumStatus = function(isPremium) {
            isUserPremium = isPremium; // Salva o status do usuário
            if (isPremium) {
                if (btnPremium) btnPremium.classList.add('hidden');
                if (premiumSuccess) {
                    premiumSuccess.innerText = t.premiumSuccess;
                    premiumSuccess.classList.remove('hidden');
                }
            }
        };

        // --- LÓGICA DE CÂMERA E ANÁLISE ---
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const outputPanel = document.getElementById("output-panel");
        const controlsDiv = document.getElementById("controls");
        const captureBtn = document.getElementById("captureBtn");
        
        async function startCamera() { 
            try { 
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } } 
                }); 
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.style.opacity = 1; };
            } catch (err) { alert("Camera Error."); } 
        }

        function resetUI() {
            canvas.style.display = 'none';
            video.style.display = 'block';
            outputPanel.style.display = 'none';
            outputPanel.innerHTML = '';
            controlsDiv.style.display = 'block';
            captureBtn.disabled = false;
            setTimeout(() => { video.style.opacity = 1; }, 100);
        }

        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            
            // --- BLOQUEIO PREMIUM ---
            // Se o usuário NÃO for premium, impede a foto e mostra o aviso
            if (!isUserPremium) {
                video.style.opacity = 0;
                setTimeout(() => { video.style.display = 'none'; }, 300);
                controlsDiv.style.display = 'none';

                outputPanel.innerHTML = `
                    <div class="p-8 text-center mt-10">
                        <p class="text-5xl mb-4">⭐</p>
                        <h3 class="font-bold text-xl text-yellow-400 mb-3">${t.premiumBtnBase}</h3>
                        <p class="text-md text-gray-200 leading-relaxed mb-8">${t.needsPremium}</p>
                        <button onclick="resetUI()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-4 rounded-full transition-colors">
                            🔙 ${t.backBtn}
                        </button>
                    </div>
                `;
                outputPanel.style.display = 'block';
                return; // Interrompe o código aqui, a API não será chamada.
            }
            // ------------------------

            const MAX_WIDTH = 1024;
            const scale = MAX_WIDTH / video.videoWidth;
            canvas.width = MAX_WIDTH;
            canvas.height = video.videoHeight * scale;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            video.style.display = 'none';
            video.style.opacity = 0;
            canvas.style.display = 'block';
            controlsDiv.style.display = 'none';

            // Loading state traduzido
            outputPanel.innerHTML = `<div class="p-10 text-center"><p class="text-2xl animate-pulse">🍃</p><p class="mt-4 text-green-300">${t.loading}</p></div>`;
            outputPanel.style.display = 'block';

            try {
                const imageDataUrl = canvas.toDataURL('image/jpeg', 0.85);
                const analysis_type = document.querySelector('input[name="analysis_type"]:checked').value;

                const response = await fetch('/api/analyze-plant', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageDataUrl, analysis_type, language: userLang }),
                });

                if (!response.ok) throw new Error(`API Error`);
                const data = await response.json();
                renderResults(data);

            } catch (error) {
                // Erro traduzido
                outputPanel.innerHTML = `<div class="p-6 text-center text-red-400"><p class="text-xl">🍂</p><p>${t.errorMsg}</p><button onclick="resetUI()" class="mt-4 text-sm underline">${t.retryBtn}</button></div>`;
            }
        });

        function renderResults(data) {
            let diagnosisHTML = '';
            if (data.diagnostico && data.saude.status !== 'Saudável' && data.saude.status !== 'Healthy') {
                diagnosisHTML = `
                    <div class="diagnosis-section">
                        <h3 class="font-bold text-lg text-red-400 mb-2">${t.diagnosisTitle}</h3>
                        <p class="mb-1"><strong class="text-white">${t.problemLabel}</strong> ${data.diagnostico.problema}</p>
                        <p class="mb-1"><strong class="text-white">${t.causeLabel}</strong> ${data.diagnostico.causa_provavel}</p>
                        <p class="text-sm opacity-80">${data.diagnostico.sintomas_visiveis}</p>
                    </div>
                `;
            }

            const actionPlanHTML = data.plano_de_acao.passos.map(step => `
                <div class="plan-step">
                    <h4 class="font-bold text-green-400">${step.titulo}</h4>
                    <p class="text-sm text-gray-200">${step.instrucao}</p>
                </div>
            `).join('');

            const isHealthy = (data.saude.status === 'Saudável' || data.saude.status === 'Healthy');

            const html = `
                <div class="result-card">
                    <h2 class="text-3xl font-bold text-green-400 leading-tight">${data.identificacao.nome_popular}</h2>
                    <p class="italic text-gray-400 mb-4 text-sm">${data.identificacao.nome_cientifico}</p>
                    
                    <p class="mb-6 text-gray-100 leading-relaxed">${data.identificacao.descricao}</p>
                    
                    <div class="flex items-center gap-3 mb-6 bg-gray-800 p-3 rounded-lg">
                        <div class="text-2xl">${isHealthy ? '💚' : '🥀'}</div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-wider">${t.healthStatusLabel}</p>
                            <p class="font-bold ${isHealthy ? 'text-green-400' : 'text-red-400'}">${data.saude.status}</p>
                        </div>
                    </div>

                    ${diagnosisHTML}

                    <h3 class="text-xl font-bold mt-8 mb-4 border-b border-gray-700 pb-2">${t.carePlanTitle}</h3>
                    ${actionPlanHTML}
                    
                    <p class="disclaimer">${data.disclaimer}</p>
                    
                    <button onclick="resetUI()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-full mt-2 transition-colors">
                        📸 ${t.analyzeAnotherBtn}
                    </button>
                </div>
            `;
            
            outputPanel.innerHTML = html;
        }

        startCamera();
    </script>
</body>
</html>
